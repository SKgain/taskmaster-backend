version: '3.8'

services:
  db:
    image: postgres:15
    container_name: task-db
    environment:
      POSTGRES_USER: saikat
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - task-db-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: taskmaster-app
    container_name: task-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/taskdb
      SPRING_DATASOURCE_USERNAME: saikat
      SPRING_DATASOURCE_PASSWORD: secret
    depends_on:
      - db

volumes:
  task-db-data:
