# ==========================================
# Database (PROD)
# Use Environment Variables
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ==========================================
# Logging (PROD)
# ==========================================
logging.level.root=INFO

# Remove all unnecessary framework noise
logging.level.org.hibernate=WARN
logging.level.org.springframework.data.jpa=WARN
logging.level.org.apache.coyote.http11=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot.autoconfigure=WARN

# Only your application logs
logging.level.com.dhrubok.taskmaster=INFO

# Group noisy db logs
logging.group.data=org.springframework.data.jpa, org.hibernate, com.zaxxer.hikari
logging.level.data=ERROR

# Elegant production log format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{20} - %msg%n

# Production log rotation
logging.file.name=logs/taskmaster.log
