<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Password Reset</title>
</head>

<body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif;">

<table width="100%" style="max-width:600px;margin:auto;background:#fff;border-radius:8px;padding:20px;">
    <tr>
        <td style="text-align:center;padding:20px 0;">
            <h2 style="color:#4CAF50;margin:0;">TaskMaster</h2>
            <p style="color:#777;font-size:14px;margin-top:5px;">Reset Your Password</p>
        </td>
    </tr>

    <tr>
        <td style="padding:20px;">
            <p style="color:#555;font-size:16px;line-height:1.6;">
                You requested to reset your password.
                Click the button below to create a new one.
            </p>

            <div style="text-align:center;margin:30px 0;">
                <a href="{{RESET_URL}}"
                   style="background:#FF5722;color:white;padding:12px 24px;text-decoration:none;
                          font-size:16px;border-radius:6px;display:inline-block;">
                    Reset Password
                </a>
            </div>

            <p style="background:#eee;padding:10px;font-size:13px;border-radius:5px;">
                {{RESET_URL}}
            </p>

            <p style="color:#999;font-size:12px;text-align:center;margin-top:20px;">
                If you did not request a reset, please ignore this email.
            </p>
        </td>
    </tr>
</table>

</body>
</html>
