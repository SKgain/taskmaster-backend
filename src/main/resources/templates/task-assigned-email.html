<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>New Task Assigned</title>
</head>

<body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif;">

<table width="100%" style="max-width:600px;margin:auto;background:white;border-radius:8px;padding:20px;">

    <tr>
        <td style="text-align:center;padding:20px 0;">
            <h2 style="color:#4CAF50;margin:0;">New Task Assigned</h2>
            <p style="color:#777;font-size:14px;margin-top:5px;">You have a new responsibility</p>
        </td>
    </tr>

    <tr>
        <td style="padding:20px;">
            <p style="font-size:16px;color:#555;line-height:1.6;">
                A new task has been assigned to you:<br><br>
                <strong>Task:</strong> {{TASK_NAME}}<br>
                <strong>Due Date:</strong> {{DUE_DATE}}<br>
                <strong>Assigned By:</strong> {{ASSIGNED_BY}}<br>
            </p>

            <div style="text-align:center;margin:30px 0;">
                <a href="{{TASK_URL}}"
                   style="background:#673AB7;color:white;padding:12px 24px;text-decoration:none;
                          font-size:16px;border-radius:6px;display:inline-block;">
                    View Task
                </a>
            </div>

            <p style="color:#999;font-size:12px;text-align:center;margin-top:20px;">
                Stay productive with TaskMaster!
            </p>
        </td>
    </tr>

</table>

</body>
</html>
