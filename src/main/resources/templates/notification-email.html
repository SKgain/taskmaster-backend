<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>TaskMaster Notification</title>
</head>

<body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif;">

<table width="100%" style="max-width:600px;margin:auto;background:white;border-radius:8px;padding:20px;">
    <tr>
        <td style="text-align:center;padding:20px 0;">
            <h2 style="color:#4CAF50;margin:0;">TaskMaster Notification</h2>
            <p style="color:#777;font-size:14px;margin-top:5px;">You have an update</p>
        </td>
    </tr>

    <tr>
        <td style="padding:20px;">
            <p style="font-size:16px;color:#555;line-height:1.6;">
                {{MESSAGE}}
            </p>

            <div style="text-align:center;margin:30px 0;">
                <a href="{{ACTION_URL}}"
                   style="background:#2196F3;color:white;padding:12px 24px;text-decoration:none;
                          font-size:16px;border-radius:6px;display:inline-block;">
                    View Details
                </a>
            </div>

            <p style="background:#eee;padding:10px;font-size:13px;border-radius:5px;">
                {{ACTION_URL}}
            </p>

            <p style="color:#999;font-size:12px;text-align:center;margin-top:20px;">
                This is an automated notification from TaskMaster.
            </p>
        </td>
    </tr>
</table>

</body>
</html>
